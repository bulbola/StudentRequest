{% extends 'base.html' %}{% block content %}
<h1>Создание заявки</h1>
<form method="post" enctype="multipart/form-data">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <label>Категория</label><select name="category_id" required>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
  <label>Тема</label><input name="title" maxlength="180" minlength="5" required>
  <label>Описание</label><textarea name="description" rows="7" maxlength="4000" minlength="20" required></textarea>
  <label>Приоритет</label><select name="priority"><option value="low">Низкий</option><option value="normal" selected>Обычный</option><option value="high">Высокий</option></select>
  <label>Файл</label><input type="file" name="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg">
  <small>Максимальный размер файла - 5 МБ.</small>
  <button class="btn" type="submit">Отправить</button>
</form>
{% endblock %}
