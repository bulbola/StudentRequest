{% extends 'base.html' %}{% block content %}
<h1>Панель сотрудника</h1>
<table><tr><th>ID</th><th>Студент</th><th>Тема</th><th>Статус</th><th></th></tr>
{% for r in requests %}<tr><td>{{ r.id }}</td><td>{{ r.student.full_name }}</td><td>{{ r.title }}</td><td>{{ r.status }}</td><td><a href="{{ url_for('employee.process_request', request_id=r.id) }}">Обработать</a></td></tr>{% endfor %}
</table>
{% endblock %}
