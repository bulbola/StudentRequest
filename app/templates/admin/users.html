{% extends 'base.html' %}{% block content %}
<h1>Пользователи</h1><p><a class="btn" href="{{ url_for('admin.create_user') }}">Создать пользователя</a></p><table><tr><th>ФИО</th><th>Email</th><th>Роль</th><th>Активен</th><th>Действие</th></tr>{% for u in users %}<tr><td>{{ u.full_name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.is_active }}</td><td><a class="btn secondary" href="{{ url_for('admin.edit_user', user_id=u.id) }}">Редактировать</a></td></tr>{% endfor %}</table>
{% endblock %}
