{% extends 'base.html' %}{% block content %}
<h1>Категории заявок</h1><p><a class="btn" href="{{ url_for('admin.create_category') }}">Создать категорию</a></p><table><tr><th>ID</th><th>Название</th><th>Описание</th><th>Активна</th><th>Действие</th></tr>{% for c in categories %}<tr><td>{{ c.id }}</td><td>{{ c.name }}</td><td>{{ c.description }}</td><td>{{ c.is_active }}</td><td><a class="btn secondary" href="{{ url_for('admin.edit_category', category_id=c.id) }}">Редактировать</a></td></tr>{% endfor %}</table>
{% endblock %}
